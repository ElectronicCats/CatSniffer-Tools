name: Build Arch Linux Package

on:
  push:
    branches:
      - main
      - master
      - dev
  release:
    types: [created]

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git python python-pip python-setuptools \
            python-pyserial python-pyusb python-requests python-colorama python-rich \
            python-pycryptodome python-cryptography python-click python-intelhex \
            python-matplotlib python-numpy python-scapy python-textual python-magic \
            libusb sudo

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Package Version
        id: get_version
        run: |
          # Automatically extract the version from the DEBIAN/control file
          VERSION=$(grep -i '^Version:' catnip/packaging/debian/DEBIAN/control | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Prepare Packaging Environment
        run: |
          BUILD_DIR="build_arch"

          # 1. Create base directory structure following Arch packaging conventions
          mkdir -p "$BUILD_DIR"

          # 2. Create the subfolders where the source code should live
          PKG_DIR="${BUILD_DIR}/usr/lib/python3/dist-packages/catnip"
          DIST_DIR="${BUILD_DIR}/usr/lib/python3/dist-packages"
          mkdir -p "$PKG_DIR"

          # 3. Copy fresh source code directly from the root repository to the packaging folder
          cp -r catnip/modules/ "$PKG_DIR/"
          cp catnip/catnip.py "$PKG_DIR/"
          touch "$PKG_DIR/__init__.py"

          # 4. Copy protocol/ as a top-level package (sibling of catnip/, not inside it)
          #    This mirrors the project root layout where protocol/ sits next to modules/,
          #    making "from protocol.X import Y" work both installed and via python catnip.py
          cp -r catnip/protocol/ "$DIST_DIR/"

          # 5. Install the launcher script
          mkdir -p "$BUILD_DIR/usr/bin"
          cp catnip/packaging/debian/usr/bin/catnip "$BUILD_DIR/usr/bin/catnip"
          chmod 755 "$BUILD_DIR/usr/bin/catnip"

          # 6. Install udev rules
          mkdir -p "$BUILD_DIR/usr/lib/udev/rules.d"
          cp catnip/packaging/debian/lib/udev/rules.d/99-catsniffer.rules \
            "$BUILD_DIR/usr/lib/udev/rules.d/99-catsniffer.rules"

          # 7. Install desktop entry
          mkdir -p "$BUILD_DIR/usr/share/applications"
          cp catnip/packaging/debian/usr/share/applications/catnip.desktop \
            "$BUILD_DIR/usr/share/applications/catnip.desktop"

      - name: Create PKGBUILD
        run: |
          cat > build_arch/PKGBUILD << EOF
          pkgname=catnip
          pkgver=${{ env.VERSION }}
          pkgrel=1
          pkgdesc="CatSniffer Tools - Multi-protocol sniffer and analysis tool"
          arch=('any')
          url="https://github.com/ElectronicCats/catsniffer-tools"
          depends=('python' 'python-pyserial' 'python-pyusb' 'python-requests'
                   'python-colorama' 'python-rich' 'python-pycryptodome'
                   'python-cryptography' 'python-click' 'python-intelhex'
                   'python-matplotlib' 'python-numpy' 'python-scapy'
                   'python-textual' 'python-magic' 'libusb')

          package() {
            cp -r "\$srcdir"/../usr "\$pkgdir/"
          }
          EOF

      - name: Build .pkg.tar.zst Package
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder build_arch/
          cd build_arch && sudo -u builder makepkg -f --noconfirm

      - name: Move Package to Root
        run: |
          mv build_arch/*.pkg.tar.zst "catnip-${{ env.VERSION }}.pkg.tar.zst"

      - name: Upload Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: catnip-arch-package
          path: "*.pkg.tar.zst"
          retention-days: 30

      - name: Upload to GitHub Releases (Only Releases)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: "catnip-${{ env.VERSION }}.pkg.tar.zst"
