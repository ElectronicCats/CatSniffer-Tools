name: Build Arch Linux Package

on:
  push:
    branches:
      - main
      - master
      - dev
  release:
    types: [created]

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git python python-pip python-setuptools python-build python-installer python-wheel \
            python-pyserial python-pyusb python-requests python-colorama python-rich python-pycryptodome python-cryptography \
            python-click python-intelhex python-matplotlib python-numpy python-scapy python-textual python-magic libusb sudo

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Package Version
        id: get_version
        run: |
          # Try to extract version from DEBIAN/control
          if [ -f "catnip/packaging/debian/DEBIAN/control" ]; then
            VERSION=$(grep -i '^Version:' catnip/packaging/debian/DEBIAN/control | awk '{print $2}')
          fi

          if [ -z "$VERSION" ]; then
            if [ "${{ github.event_name }}" == "release" ]; then
              VERSION="${{ github.ref_name }}"
              VERSION=${VERSION#v}
            else
              VERSION=$(date +%Y.%m.%d)
            fi
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Package version: $VERSION"

      - name: Create PKGBUILD
        working-directory: catnip
        run: |
          cat > PKGBUILD << 'EOF'
          pkgname=catnip
          pkgver=${{ env.VERSION }}
          pkgrel=1
          pkgdesc="CatSniffer Tools - Multi-protocol sniffer and analysis tool"
          arch=('any')
          url="https://github.com/ElectronicCats/catsniffer-tools"
          depends=('python' 'python-pyserial' 'python-pyusb' 'python-requests'
                   'python-colorama' 'python-rich' 'python-pycryptodome'
                   'python-cryptography' 'python-click' 'python-intelhex'
                   'python-matplotlib' 'python-numpy' 'python-scapy'
                   'python-textual' 'python-magic' 'libusb')
          makedepends=('python-build' 'python-installer' 'python-wheel' 'python-setuptools')
          source=("$pkgname-$pkgver.tar.gz")
          sha256sums=('SKIP')

          build() {
            cd "$srcdir"
            # The source is already in the 'catnip' folder of the tarball we create
            cd "catsniffer-tools-$pkgver/catnip"
            python -m build --wheel --no-isolation
          }

          package() {
            cd "$srcdir/catsniffer-tools-$pkgver/catnip"

            # Detect Python version
            local python_version=$(python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')

            # Install Python package
            python -m installer --destdir="$pkgdir" dist/*.whl

            # Create symlink for main script
            install -Dm755 catnip.py "$pkgdir/usr/bin/catnip"

            # Install udev rules
            install -Dm644 packaging/debian/lib/udev/rules.d/99-catsniffer.rules \
              "$pkgdir/usr/lib/udev/rules.d/99-catsniffer.rules"

            # Install desktop entry
            install -Dm644 packaging/debian/usr/share/applications/catnip.desktop \
              "$pkgdir/usr/share/applications/catnip.desktop"

            # Ensure modules and protocol are correctly placed if not handled by build
            # Note: setup.py should handle most of this, but we keep this for safety
            # mirroring the project structure.
            local site_packages="$pkgdir/usr/lib/python$python_version/site-packages"
            mkdir -p "$site_packages"
            cp -r modules/* "$site_packages/catnip/" 2>/dev/null || true
            cp -r protocol "$site_packages/" 2>/dev/null || true
          }
          EOF

      - name: Create .tar.gz source
        working-directory: catnip
        run: |
          mkdir -p "catsniffer-tools-${{ env.VERSION }}"
          cp -r ../* "catsniffer-tools-${{ env.VERSION }}/"
          tar -czf "catnip-${{ env.VERSION }}.tar.gz" "catsniffer-tools-${{ env.VERSION }}"
          rm -rf "catsniffer-tools-${{ env.VERSION }}"

      - name: Build Package
        working-directory: catnip
        run: |
          sed -i "s/SKIP/$(sha256sum catnip-${{ env.VERSION }}.tar.gz | cut -d' ' -f1)/" PKGBUILD
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          sudo -u builder makepkg -f --noconfirm

      - name: Rename Package
        working-directory: catnip
        run: |
          PKG_FILE=$(ls *.pkg.tar.zst | head -n 1)
          echo "PACKAGE_NAME=$PKG_FILE" >> $GITHUB_ENV

      - name: Upload Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: catnip-arch-package
          path: "catnip/*.pkg.tar.zst"

      - name: Upload to GitHub Releases (Only Releases)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: "catnip/*.pkg.tar.zst"
