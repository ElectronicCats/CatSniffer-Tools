name: Build Arch Linux Package

on:
  push:
    branches:
      - main
      - master
      - dev
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Launch tag to upload assets to (ex: v3.3.2.0)'
        required: true
        default: 'v3.3.2.0'

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git python python-pip python-setuptools \
            python-pyserial python-pyusb python-requests python-colorama python-rich \
            python-pycryptodome python-cryptography python-click python-intelhex \
            python-matplotlib python-numpy python-scapy python-textual python-magic \
            libusb sudo

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Package Version
        id: get_version
        run: |
          VERSION=$(cat catnip/VERSION | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Prepare Packaging Environment
        run: |
          BUILD_DIR="build_arch"

          # Detect Python version to use correct site-packages path
          PY_VER=$(python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
          echo "Detected Python version: $PY_VER"

          # 1. Create base directory structure following Arch packaging conventions
          mkdir -p "$BUILD_DIR"

          # 2. Create the subfolders where the source code should live (Arch uses site-packages)
          PKG_DIR="${BUILD_DIR}/usr/lib/python${PY_VER}/site-packages/catnip"
          DIST_DIR="${BUILD_DIR}/usr/lib/python${PY_VER}/site-packages"
          mkdir -p "$PKG_DIR"

          # 3. Copy fresh source code directly from the root repository to the packaging folder
          cp -r catnip/modules/ "$PKG_DIR/"
          cp catnip/catnip.py "$PKG_DIR/"
          cp catnip/VERSION "$PKG_DIR/"
          touch "$PKG_DIR/__init__.py"

          # 4. Copy protocol/ as a top-level package (sibling of catnip/, not inside it)
          cp -r catnip/protocol/ "$DIST_DIR/"

          # 5. Vendor all dependencies from requirements.txt
          # This allows the tool to work out-of-the-box without user-managed venvs
          mkdir -p "$PKG_DIR/vendor"
          python -m pip install --target "$PKG_DIR/vendor" -r catnip/requirements.txt

          # 6. Install the launcher script
          mkdir -p "$BUILD_DIR/usr/bin"
          cp catnip/packaging/debian/usr/bin/catnip "$BUILD_DIR/usr/bin/catnip"
          chmod 755 "$BUILD_DIR/usr/bin/catnip"

          # 7. Install udev rules
          mkdir -p "$BUILD_DIR/usr/lib/udev/rules.d"
          cp catnip/packaging/debian/lib/udev/rules.d/99-catsniffer.rules \
            "$BUILD_DIR/usr/lib/udev/rules.d/99-catsniffer.rules"

          # 8. Install desktop entry
          mkdir -p "$BUILD_DIR/usr/share/applications"
          cp catnip/packaging/debian/usr/share/applications/catnip.desktop \
            "$BUILD_DIR/usr/share/applications/catnip.desktop"

      - name: Create PKGBUILD
        run: |
          cat > build_arch/PKGBUILD << EOF
          pkgname=catnip
          pkgver=${{ env.VERSION }}
          pkgrel=1
          pkgdesc="CatSniffer Tools - Multi-protocol sniffer and analysis tool"
          arch=('any')
          url="https://github.com/ElectronicCats/catsniffer-tools"
          license=('GPL3')
          depends=('python' 'libusb')
          # Disable debug packages to prevent multiple .pkg.tar.zst files
          options=('!debug')

          package() {
            cp -r "\$srcdir"/../usr "\$pkgdir/"
          }
          EOF

      - name: Build .pkg.tar.zst Package
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder build_arch/
          cd build_arch && sudo -u builder makepkg -f --noconfirm

      - name: Move Package to Root
        run: |
          # Find the generated package, excluding any debug packages (though we disabled them)
          PKG_FILE=$(find build_arch -name "catnip-*.pkg.tar.zst" ! -name "*-debug-*.pkg.tar.zst" | head -n 1)
          if [ -z "$PKG_FILE" ]; then
            echo "Error: Package file not found!"
            exit 1
          fi
          mv "$PKG_FILE" "catnip-${{ env.VERSION }}.pkg.tar.zst"

      - name: Upload Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: catnip-arch-package
          path: "*.pkg.tar.zst"
          retention-days: 30

      - name: Upload to GitHub Releases (Only Releases)
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: "catnip-${{ env.VERSION }}.pkg.tar.zst"
