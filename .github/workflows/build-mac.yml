name: Build macOS Installer

on:
  push:
    branches:
      - main
      - master
      #- dev
      - feature/restore-cc1352
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Launch tag to upload assets to (ex: v3.3.1.0)'
        required: true
        default: 'v3.3.1.0'

jobs:
  build-mac:
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            arch: x86_64
          - os: macos-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          brew install libusb libmagic

      - name: Install Python Dependencies
        run: |
          cd catnip
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject Version into _version.py
        run: |
          VERSION=$(cat catnip/VERSION | tr -d '[:space:]')
          echo "__version__ = \"${VERSION}\"" > catnip/modules/_version.py

      - name: Build macOS Installer
        run: |
          cd catnip
          chmod +x build_mac.sh
          ./build_mac.sh

      - name: Rename and Verify Binaries
        run: |
          cd catnip
          # Get the version from the generated filename (e.g., catnip-1.2.3.pkg)
          PKG_FILE=$(ls *.pkg | head -n 1)
          NEW_NAME="${PKG_FILE%.pkg}-${{ matrix.arch }}.pkg"
          mv "$PKG_FILE" "$NEW_NAME"
          echo "PACKAGE_NAME=$NEW_NAME" >> $GITHUB_ENV

          echo "[*] Verifying architecture of $NEW_NAME..."
          file dist/catnip/catnip

      - name: Upload Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: catnip-macos-${{ matrix.arch }}
          path: "catnip/${{ env.PACKAGE_NAME }}"
          retention-days: 30

      - name: Upload to GitHub Releases (Only Releases)
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: "catnip/${{ env.PACKAGE_NAME }}"
