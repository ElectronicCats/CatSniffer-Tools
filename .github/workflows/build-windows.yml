name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
      #- dev
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: '3.3.1.0'
      release_tag:
        description: 'Tag del release al que subir los assets (ej: v3.3.1.0)'
        required: false
        default: 'v3.3.1.0'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Extract Package Version
      id: get_version
      run: |
        $version = (Get-Content "catnip\VERSION" -Raw).Trim()
        if (-not $version) { $version = "latest" }
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Install dependencies
      working-directory: catnip
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        pip install pywin32

    - name: Install 7-Zip
      run: |
        choco install 7zip -y

    - name: Download and setup libusb
      working-directory: catnip
      run: |
        mkdir libusb
        cd libusb
        curl -L -o libusb.7z https://github.com/libusb/libusb/releases/download/v1.0.26/libusb-1.0.26-binaries.7z
        & "C:\Program Files\7-Zip\7z.exe" x libusb.7z
        cd ..

    - name: Download OpenOCD for bundling
      working-directory: catnip
      run: |
        $OPENOCD_VERSION = "0.12.0-4"
        $OPENOCD_URL = "https://github.com/xpack-binaries/openocd/releases/download/v${OPENOCD_VERSION}/xpack-openocd-${OPENOCD_VERSION}-win32-x64.zip"
        Write-Host "Downloading xPack OpenOCD ${OPENOCD_VERSION}..."
        Invoke-WebRequest -Uri $OPENOCD_URL -OutFile openocd.zip
        Expand-Archive -Path openocd.zip -DestinationPath openocd_raw -Force
        $extracted = (Get-ChildItem openocd_raw -Directory | Select-Object -First 1).FullName
        Move-Item $extracted openocd_dist
        Remove-Item openocd.zip -Force
        Remove-Item openocd_raw -Recurse -Force -ErrorAction SilentlyContinue
        Write-Host "OpenOCD ready:"
        Get-ChildItem openocd_dist/bin/ | Select-Object Name

    - name: Build with PyInstaller
      working-directory: catnip
      run: |
        pyinstaller catnip_windows.spec

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Create Installer
      working-directory: catnip
      run: |
        # Ensure installer output directory exists avoiding crash
        if (!(Test-Path -Path installer)) { mkdir installer }
        # Copy the driver installation script to the installer directory
        copy scripts\install_windows_drivers.ps1 installer\
        # Compile the installer
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\catsniffer_installer.iss

    - name: Upload Action Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CatSniffer-Windows-Setup
        path: catnip/dist/CatSniffer-Setup.exe

    - name: Rename Installer for Release
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      working-directory: catnip
      run: |
        Copy-Item dist/CatSniffer-Setup.exe "dist/catnip-${{ env.VERSION }}.exe"

    - name: Upload to GitHub Releases (Only Releases)
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        files: catnip/dist/catnip-${{ env.VERSION }}.exe
