name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
      #- dev
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: '3.3.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      working-directory: catnip
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        pip install pywin32

    - name: Install 7-Zip
      run: |
        choco install 7zip -y

    - name: Download and setup libusb
      working-directory: catnip
      run: |
        mkdir libusb
        cd libusb
        curl -L -o libusb.7z https://github.com/libusb/libusb/releases/download/v1.0.26/libusb-1.0.26-binaries.7z
        & "C:\Program Files\7-Zip\7z.exe" x libusb.7z
        cd ..

    - name: Build with PyInstaller
      working-directory: catnip
      run: |
        pyinstaller catnip_windows.spec

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Create Installer
      working-directory: catnip
      run: |
        # Ensure installer output directory exists avoiding crash
        if (!(Test-Path -Path installer)) { mkdir installer }
        # Copy the driver installation script to the installer directory
        copy scripts\install_windows_drivers.ps1 installer\
        # Compile the installer
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\catsniffer_installer.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: CatSniffer-Windows-Setup
        path: catnip/dist/CatSniffer-Setup.exe

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: catnip/dist/CatSniffer-Setup.exe
        asset_name: CatSniffer-Setup-${{ github.ref_name }}.exe
        asset_content_type: application/octet-stream
